<!DOCTYPE html>
<html>
<head>
<title>AI Bricks</title>

<style>
body {
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

h1 {
margin-top:40px;
font-size:40px;
}

.btn {
padding:15px 30px;
margin:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.green { background:#00ff88; color:black; }
.red { background:#ff4d4d; }
.blue { background:#3399ff; }

.card {
background:#111;
padding:20px;
margin:20px auto;
width:300px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>🚀 AI BRICKS (AIB)</h1>
<p>Building the Future, One Intelligent Block at a Time</p>

<button class="btn green" onclick="connect()">Connect Wallet</button>
<button class="btn green" onclick="buy()">Buy</button>
<button class="btn red" onclick="sell()">Sell</button>

<div class="card">
<h3>Wallet</h3>
<p id="wallet">Disconnected</p>
</div>

<div class="card">
<h3>AI Trading Bot</h3>
<p id="status">Idle</p>
<button class="btn blue" onclick="startBot()">Start Bot</button>
</div>

<div class="card">
<h3>Profit Tracker</h3>
<p id="profit">0%</p>
</div>

<script>

let profit = 0;

function connect(){
document.getElementById("wallet").innerText = "Connected";
}

function buy(){
alert("Buy order executed");
}

function sell(){
alert("Sell order executed");
}

function startBot(){
document.getElementById("status").innerText = "Running...";

setInterval(()=>{
let change = (Math.random()*5).toFixed(2);
profit = (parseFloat(profit) + parseFloat(change)).toFixed(2);
document.getElementById("profit").innerText = profit + "%";
},2000);
}

</script>

</body>
</html>
